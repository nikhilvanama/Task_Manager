<!-- Task creation card with glassmorphism effect -->
<div class="glass p-6 rounded-2xl flex flex-col gap-6 border-slate-200/60 h-fit">
    
    <!-- Card Header -->
    <div class="flex items-center gap-2 mb-2">
        <div class="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center text-indigo-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
            </svg>
        </div>
        <h2 class="text-lg font-bold text-slate-800">New Task</h2>
    </div>

    <!-- Reactive Form for Task Details -->
    <form class="flex flex-col gap-5" [formGroup]="taskForm" (ngSubmit)="onSubmit()">
        
        <!-- Task Name Textarea -->
        <div class="space-y-1.5">
            <label for="task" class="text-xs font-semibold uppercase tracking-wider text-slate-500 ml-1">Task Description</label>
            <textarea id="task" 
                class="w-full bg-slate-50/50 rounded-xl px-4 py-3 border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all outline-none resize-none h-28 text-slate-700 placeholder:text-slate-400" 
                formControlName="task"
                placeholder="What needs to be done?"></textarea>
            <!-- Validation Error Message -->
            <p class="text-[11px] font-medium text-red-500 px-1" *ngIf="task?.hasError('required') && task?.touched">
                * This field is required
            </p>
        </div>

        <!-- Initial Status Dropdown -->
        <div class="space-y-1.5">
            <label for="status" class="text-xs font-semibold uppercase tracking-wider text-slate-500 ml-1">Initial Status</label>
            <div class="relative">
                <select id="status" 
                    class="w-full appearance-none bg-slate-50/50 rounded-xl px-4 py-3 border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all outline-none text-slate-700 cursor-pointer" 
                    formControlName="status">
                    <option value="todo">To Do</option>
                    <option value="inprogress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
                <!-- Custom Dropdown Arrow Icon -->
                <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Submit Button with Hover Animation -->
        <button type="submit"
            [disabled]="taskForm.invalid"
            class="group relative w-full bg-indigo-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:shadow-indigo-300 active:scale-[0.98] transition-all disabled:opacity-50 disabled:shadow-none disabled:pointer-events-none mt-2 overflow-hidden">
            <span class="relative z-10 flex items-center justify-center gap-2">
                Create Task
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:translate-x-1 transition-transform" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </span>
            <!-- Shine Effect Wrapper -->
            <div class="absolute inset-0 bg-linear-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
        </button>
    </form>
</div>
