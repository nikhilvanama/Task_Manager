<div class="group bg-white p-5 rounded-2xl border border-slate-200/60 shadow-sm hover:shadow-md hover:border-indigo-200/50 transition-all duration-300 relative overflow-hidden">
    <!-- Status Indicator Line -->
    <div class="absolute left-0 top-0 bottom-0 w-1 transition-all group-hover:w-1.5"
         [class.bg-slate-300]="taskItem().status === 'todo'"
         [class.bg-amber-400]="taskItem().status === 'inprogress'"
         [class.bg-emerald-500]="taskItem().status === 'completed'">
    </div>

    <div class="flex flex-col gap-4">
        <h3 class="text-base font-bold text-slate-800 leading-tight group-hover:text-indigo-600 transition-colors">
            {{taskItem().task}}
        </h3>
        
        <div class="flex items-center justify-between mt-1">
            <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider"
                 [class.bg-slate-100]="taskItem().status === 'todo'" [class.text-slate-500]="taskItem().status === 'todo'"
                 [class.bg-amber-50]="taskItem().status === 'inprogress'" [class.text-amber-600]="taskItem().status === 'inprogress'"
                 [class.bg-emerald-50]="taskItem().status === 'completed'" [class.text-emerald-600]="taskItem().status === 'completed'">
                <span class="w-1.5 h-1.5 rounded-full"
                      [class.bg-slate-400]="taskItem().status === 'todo'"
                      [class.bg-amber-400]="taskItem().status === 'inprogress'"
                      [class.bg-emerald-500]="taskItem().status === 'completed'">
                </span>
                {{taskItem().status === 'inprogress' ? 'In Progress' : taskItem().status}}
            </div>

            <div class="flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity translate-y-2 group-hover:translate-y-0 transition-transform duration-300">
                @for (item of action(); track $index) {
                    <button 
                        class="p-2 rounded-lg bg-slate-50 border border-slate-200 text-slate-500 hover:bg-indigo-600 hover:text-white hover:border-indigo-600 transition-all cursor-pointer shadow-sm active:scale-90" 
                        [title]="'Move to ' + item"
                        (click)="markAs(taskItem().task, item)">
                        @if (item === 'todo') {
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z" /></svg>
                        } @else if (item === 'inprogress') {
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>
                        } @else if (item === 'completed') {
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
                        }
                    </button>
                }
            </div>
        </div>
    </div>
</div>
